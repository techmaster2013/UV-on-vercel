<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ProxyPlaza</title>
    <link rel="icon" href="/Proxy.png">
    <link rel="stylesheet" href="style.css">
    <!-- Ultraviolet Scripts Needed to Route Requests -->
    <script src="/uv/uv.bundle.js" defer></script>
    <script src="/uv/uv.config.js" defer></script>
    <script src="index.js" defer></script>
</head>
<body>
    <div class="particles" id="particles"></div>
    
    <div class="container">
        <h1 class="logo">Proxy<span>Plaza</span></h1>
        <p class="subtitle">Explore the web without restrictions.</p>
        
        <form id="proxyForm">
            <input type="text" id="urlInput" placeholder="Search Google or type a URL..." autocomplete="off">
            <button type="submit">Search</button>
        </form>
    </div>
</body>
</html>
